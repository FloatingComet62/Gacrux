    </main>

    <script>
      let bitboard = "";
      pad();
      update();
      let textShowned = false;
      document.onkeydown = (e) => {
        if (e.key == "Enter") {
          run();
        } else if (e.key == "Escape") {
          document.getElementById("bitboard").value = "";
        } else if (e.key == "t") {
          textShowned = !textShowned;

          if (textShowned) {
            for (let i = 0; i < 64; i++) {
              const box = document.getElementById(`box ${i + 1}`);
              box.innerText = i.toString();
            }
          } else {
            for (let i = 0; i < 64; i++) {
              const box = document.getElementById(`box ${i + 1}`);
              box.innerText = "";
            }
          }
        } else if (e.key == "c") {
          navigator.clipboard.writeText(flip(bitboard));
        }
      };

      // https://stackoverflow.com/questions/68816948/from-bigint-to-binary-in-js
      function dec2bin(dec) {
        return BigInt(dec).toString(2);
      }

      function pad() {
        if (bitboard.length < 64) {
          let padding = new Array(64 - bitboard.length);
          padding.fill("0");
          bitboard = padding.join("") + bitboard;
        } else if (bitboard.length > 64) {
          bitboard = bitboard.slice(0, 65);
        }
      }
      function update() {
        for (let i = 0; i < 64; i++) {
          const box = document.getElementById(`box ${i + 1}`);
          if (bitboard[i] == "1") {
            box.classList.remove("false");
            box.classList.add("true");
          } else {
            box.classList.remove("true");
            box.classList.add("false");
          }
        }
      }
      function flip(s) {
        const x = s.split("");
        x.reverse();
        return x.join("");
      }
      function replace(str, index, char) {
        let x = str.split("");
        x[index] = char;
        return x.join("");
      }

      for (let i = 0; i < 64; i++) {
        const box = document.getElementById(`box ${i + 1}`);
        box.onclick = () => {
          if (bitboard[i] == "1") {
            bitboard = replace(bitboard, i, "0");
          } else {
            bitboard = replace(bitboard, i, "1");
            console.log(bitboard[i]);
          }
          update();
        };
      }

      const button = document.getElementById("submit");
      button.onclick = run;
      function run() {
        bitboard = dec2bin(document.getElementById("bitboard").value);
        pad();
        bitboard = flip(bitboard);
        console.log(bitboard);
        update();
      }
    </script>
    <style>

      button:hover {

      main {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(8, 50px);
        grid-template-rows: repeat(8, 50px);
        align-items: center;
        justify-content: center;
      }
      .box {
        width: 40px;

        font-weight: bold;
      }
      .true {

      }
      .false {

      }
    </style>
